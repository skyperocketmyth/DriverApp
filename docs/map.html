<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>RSA Driver Pilot — Live Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }

    /* Top status bar */
    #statusbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(13,71,161,0.92); backdrop-filter: blur(4px);
      color: #fff; padding: 8px 14px;
      display: flex; align-items: center; gap: 12px;
      font-size: 13px; font-weight: 600;
    }
    #statusbar .title { font-size: 14px; font-weight: 800; margin-right: 4px; }
    #driver-count {
      background: rgba(255,255,255,0.2); border-radius: 12px;
      padding: 2px 10px; font-size: 12px;
    }
    #sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #aaa; flex-shrink: 0;
    }
    #sync-dot.live { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
    #sync-dot.auth { background: #FF9800; }
    #sync-dot.err  { background: #f44336; }
    #sync-label { font-size: 11px; opacity: 0.8; }

    /* Legend */
    #legend {
      position: absolute; bottom: 16px; left: 14px; z-index: 1000;
      background: rgba(255,255,255,0.94); border-radius: 10px;
      padding: 10px 14px; font-size: 12px; color: #333;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 140px;
    }
    #legend .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    #legend .leg-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-line { width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    /* Driver cards panel (right side on desktop, bottom on mobile) */
    #driver-panel {
      position: absolute; top: 48px; right: 0; bottom: 0; z-index: 900;
      width: 260px; overflow-y: auto;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(4px);
      border-left: 1px solid #E0E0E0;
      padding: 10px 0;
    }
    .driver-card {
      padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
      transition: background 0.15s;
    }
    .driver-card:hover { background: #f5f9ff; }
    .driver-card .d-name { font-weight: 700; font-size: 13px; color: #1A1A2E; }
    .driver-card .d-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .driver-card .d-km { font-size: 12px; font-weight: 700; color: #0D47A1; margin-top: 3px; }
    .stage-badge {
      display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px;
      border-radius: 10px; margin-top: 3px;
    }
    .s1 { background: #E3F2FD; color: #1565C0; }
    .s2 { background: #F3E5F5; color: #6A1B9A; }
    .s3 { background: #FFF8E1; color: #F57F17; }
    .s4 { background: #E8F5E9; color: #2E7D32; }

    #no-drivers {
      padding: 24px 14px; text-align: center; color: #aaa; font-size: 13px;
    }

    /* Panel toggle button (mobile) */
    #panel-toggle {
      position: absolute; top: 56px; right: 268px; z-index: 1001;
      background: #0D47A1; color: #fff; border: none; border-radius: 6px 0 0 6px;
      padding: 8px 10px; cursor: pointer; font-size: 16px;
      box-shadow: -2px 2px 8px rgba(0,0,0,0.2);
    }

    /* Custom marker styles (rendered as divIcon) */
    .driver-marker-wrap {
      display: flex; flex-direction: column; align-items: center;
    }
    .driver-marker-icon {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .driver-marker-label {
      margin-top: 2px; background: rgba(13,71,161,0.85);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 8px; white-space: nowrap;
      max-width: 90px; overflow: hidden; text-overflow: ellipsis;
    }

    @media (max-width: 640px) {
      #driver-panel { width: 200px; }
      #panel-toggle { right: 208px; }
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="statusbar">
  <span class="title">RSA Live Map</span>
  <span id="driver-count">0 active</span>
  <div style="flex:1"></div>
  <div id="sync-dot" class="auth"></div>
  <span id="sync-label">Authenticating...</span>
</div>

<button id="panel-toggle" title="Toggle driver list">&#9776;</button>

<div id="driver-panel">
  <div id="no-drivers">No active drivers right now</div>
</div>

<div id="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#0D47A1"></div> Driver (live)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#E53935"></div> Facility</div>
  <div class="leg-row"><div class="leg-line" style="background:#1976D2"></div> Snapped route</div>
  <div class="leg-row"><div class="leg-line" style="background:#90CAF9;border-top:2px dashed #90CAF9;height:0"></div> Raw GPS</div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<!-- Firebase App + Database + Auth (compat SDK v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// =============================================================================
// CONFIGURATION
// =============================================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCTJcr0Yar3DIHLE36Pm6e3kdsFCIyt56k",
  authDomain:        "warehouse-stock-take.firebaseapp.com",
  databaseURL:       "https://warehouse-stock-take-default-rtdb.firebaseio.com",
  projectId:         "warehouse-stock-take",
  storageBucket:     "warehouse-stock-take.firebasestorage.app",
  messagingSenderId: "740578243967"
};

const FACILITY = { lat: 24.903892, lng: 55.114065 };
const OSRM_BASE = 'https://router.project-osrm.org/match/v1/driving/';

// Palette for up to 20 concurrent drivers
const DRIVER_COLORS = [
  '#0D47A1','#1B5E20','#880E4F','#E65100','#4A148C',
  '#006064','#BF360C','#1A237E','#33691E','#004D40',
  '#B71C1C','#F57F17','#01579B','#3E2723','#212121',
  '#6A1B9A','#00838F','#558B2F','#37474F','#4E342E'
];

// =============================================================================
// INIT MAP
// =============================================================================
const map = L.map('map', { zoomControl: true }).setView([FACILITY.lat, FACILITY.lng], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// Facility marker (red pin)
const facilityIcon = L.divIcon({
  className: '',
  html: '<div style="width:22px;height:22px;border-radius:50%;background:#E53935;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:11px;">&#127981;</div>',
  iconSize: [22,22], iconAnchor: [11,11]
});
L.marker([FACILITY.lat, FACILITY.lng], { icon: facilityIcon })
  .bindPopup('<b>RSA Facility</b>')
  .addTo(map);

// =============================================================================
// STATE
// =============================================================================
// driverState[driverId] = {
//   marker, polylineSnapped, polylineRaw, routePoints[], shiftRowId,
//   routeRef (firebase ref), routeListener, color, osrmTimer, cardEl
// }
const driverState = {};
let colorIndex = 0;

function nextColor() {
  const c = DRIVER_COLORS[colorIndex % DRIVER_COLORS.length];
  colorIndex++;
  return c;
}

// =============================================================================
// STATUS BAR
// =============================================================================
function setStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + state;  // live | auth | err
  document.getElementById('sync-label').textContent = label;
}

function updateDriverCount() {
  const n = Object.keys(driverState).length;
  document.getElementById('driver-count').textContent = n + (n === 1 ? ' active' : ' active');
  document.getElementById('no-drivers').style.display = n === 0 ? '' : 'none';
}

// =============================================================================
// DRIVER MARKER
// =============================================================================
function makeDriverIcon(color, initial) {
  return L.divIcon({
    className: '',
    html: '<div class="driver-marker-wrap">'
      + '<div class="driver-marker-icon" style="background:' + color + '">&#128666;</div>'
      + '</div>',
    iconSize: [40,42], iconAnchor: [20,21], popupAnchor: [0,-22]
  });
}

// =============================================================================
// DRIVER CARD (sidebar)
// =============================================================================
function stageName(s) {
  return ['','S1: At Facility','S2: On Road','S3: Last Drop','S4: Done'][s] || ('Stage '+s);
}
function stageClass(s) {
  return ['','s1','s2','s3','s4'][s] || 's1';
}

function upsertDriverCard(driverId, data) {
  var panel = document.getElementById('driver-panel');
  var card = document.getElementById('card-' + driverId);
  if (!card) {
    card = document.createElement('div');
    card.className = 'driver-card';
    card.id = 'card-' + driverId;
    card.onclick = function() {
      var ds = driverState[driverId];
      if (ds && ds.marker) { map.panTo(ds.marker.getLatLng()); }
    };
    panel.appendChild(card);
  }
  var stage = data.stage || 1;
  var timeStr = data.ts ? new Date(data.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
  card.innerHTML =
    '<div class="d-name">' + escHtml(data.driverName || driverId) + '</div>' +
    '<div class="d-meta">' + escHtml(data.vehicle || '\u2014') + ' &middot; ' + escHtml(timeStr) + '</div>' +
    '<div class="d-km">' + (data.km||0).toFixed(1) + ' km</div>' +
    '<span class="stage-badge ' + stageClass(stage) + '">' + stageName(stage) + '</span>';
  return card;
}

function removeDriverCard(driverId) {
  var el = document.getElementById('card-' + driverId);
  if (el) el.remove();
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =============================================================================
// OSRM ROAD SNAPPING
// Sends up to 100 GPS points to OSRM match API, returns snapped [lat,lng] array.
// Falls back to raw points if OSRM fails or returns no match.
// =============================================================================
function snapToRoads(points) {
  if (points.length < 2) return Promise.resolve(points.map(function(p){ return [p.lat, p.lng]; }));
  // Use last 100 points max (OSRM limit)
  var pts = points.slice(-100);
  var coords = pts.map(function(p){ return p.lng + ',' + p.lat; }).join(';');
  var radiuses = pts.map(function(){ return '25'; }).join(';');
  var url = OSRM_BASE + coords + '?overview=full&geometries=geojson&radiuses=' + radiuses + '&tidy=true';
  return fetch(url, { signal: AbortSignal.timeout(8000) })
    .then(function(resp) {
      if (!resp.ok) throw new Error('OSRM HTTP ' + resp.status);
      return resp.json();
    })
    .then(function(json) {
      // Concatenate all matching segments for better coverage
      if (json.matchings && json.matchings.length > 0) {
        var allCoords = [];
        json.matchings.forEach(function(m) {
          if (m.geometry && m.geometry.coordinates) {
            m.geometry.coordinates.forEach(function(c) {
              allCoords.push([c[1], c[0]]); // GeoJSON [lng,lat] -> Leaflet [lat,lng]
            });
          }
        });
        if (allCoords.length >= 2) return allCoords;
      }
      // Fallback: raw GPS
      return pts.map(function(p){ return [p.lat, p.lng]; });
    })
    .catch(function(e) {
      console.warn('[OSRM] snap failed:', e.message, '- using raw GPS');
      return pts.map(function(p){ return [p.lat, p.lng]; });
    });
}

// =============================================================================
// ROUTE RENDERING
// Called when new route points arrive. Debounced per driver.
// =============================================================================
function scheduleRouteRedraw(driverId) {
  var ds = driverState[driverId];
  if (!ds) return;
  if (ds.osrmTimer) clearTimeout(ds.osrmTimer);
  ds.osrmTimer = setTimeout(function(){ redrawRoute(driverId); }, 3000); // 3s debounce
}

function redrawRoute(driverId) {
  var ds = driverState[driverId];
  if (!ds || ds.routePoints.length < 2) return;

  // Remove old polylines
  if (ds.polylineSnapped) { map.removeLayer(ds.polylineSnapped); ds.polylineSnapped = null; }
  if (ds.polylineRaw)     { map.removeLayer(ds.polylineRaw);     ds.polylineRaw = null; }

  var rawLatLngs = ds.routePoints.map(function(p){ return [p.lat, p.lng]; });

  // Draw thin dashed raw GPS line as base layer
  ds.polylineRaw = L.polyline(rawLatLngs, {
    color: '#90CAF9', weight: 2, dashArray: '4 4', opacity: 0.6
  }).addTo(map);

  // Draw road-snapped polyline on top
  snapToRoads(ds.routePoints).then(function(snapped) {
    if (snapped.length >= 2) {
      ds.polylineSnapped = L.polyline(snapped, {
        color: ds.color, weight: 5, opacity: 0.85, lineJoin: 'round', lineCap: 'round'
      }).addTo(map);
    }
  });
}

// =============================================================================
// FIREBASE ROUTE LISTENER - subscribes to gps/routes/{shiftRowId}
// =============================================================================
function attachRouteListener(driverId, shiftRowId) {
  var ds = driverState[driverId];
  if (!ds) return;

  // Detach previous listener if rowId changed
  if (ds.routeRef) {
    ds.routeRef.off('value', ds.routeListener);
    ds.routeRef = null; ds.routeListener = null;
  }

  if (!shiftRowId) return;

  var ref = firebase.database().ref('gps/routes/' + shiftRowId);
  var handler = function(snapshot) {
    var val = snapshot.val();
    if (!val) { driverState[driverId].routePoints = []; return; }
    // Sort by ts to ensure correct order
    var pts = Object.values(val).sort(function(a, b) { return a.ts < b.ts ? -1 : 1; });
    driverState[driverId].routePoints = pts;
    scheduleRouteRedraw(driverId);
  };
  ref.on('value', handler);
  ds.routeRef = ref;
  ds.routeListener = handler;
}

// =============================================================================
// ADD / UPDATE DRIVER ON MAP
// =============================================================================
function upsertDriver(driverId, data) {
  var today = new Date().toISOString().slice(0,10);
  // Only show drivers from today (UTC date)
  if (data.date && data.date !== today) return;

  var lat = parseFloat(data.lat);
  var lng = parseFloat(data.lng);
  if (!lat || !lng) return;

  var ds = driverState[driverId];

  if (!ds) {
    // New driver - create all resources
    var color = nextColor();
    var icon = makeDriverIcon(color, (data.driverName||'?')[0]);
    var marker = L.marker([lat, lng], { icon: icon })
      .bindPopup(function(){ return buildPopup(driverId); })
      .addTo(map);

    ds = {
      marker: marker, color: color,
      polylineSnapped: null, polylineRaw: null,
      routePoints: [], shiftRowId: null,
      routeRef: null, routeListener: null,
      osrmTimer: null, cardEl: null,
    };
    driverState[driverId] = ds;
    updateDriverCount();
  } else {
    // Move existing marker
    ds.marker.setLatLng([lat, lng]);
  }

  // Update popup and sidebar card
  ds.currentData = data;
  upsertDriverCard(driverId, data);

  // Attach route listener if shiftRowId changed
  if (data.shiftRowId && data.shiftRowId !== ds.shiftRowId) {
    ds.shiftRowId = data.shiftRowId;
    ds.routePoints = []; // reset points for new shift
    attachRouteListener(driverId, data.shiftRowId);
  }
}

function buildPopup(driverId) {
  var ds = driverState[driverId];
  if (!ds || !ds.currentData) return 'Loading...';
  var d = ds.currentData;
  var time = d.ts ? new Date(d.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
  return '<div style="font-size:13px;min-width:140px">'
    + '<b style="font-size:14px">' + escHtml(d.driverName||driverId) + '</b><br>'
    + '<span style="color:#666">Shift: ' + escHtml(d.shiftRowId||'\u2014') + '</span><br>'
    + '<b style="color:#0D47A1">' + (d.km||0).toFixed(2) + ' km</b>'
    + '<span style="color:#aaa;font-size:11px;float:right">' + time + '</span><br>'
    + '<span style="color:#888;font-size:11px">Accuracy: ' + Math.round(d.accuracy||0) + 'm</span>'
    + '</div>';
}

// =============================================================================
// REMOVE DRIVER FROM MAP
// =============================================================================
function removeDriver(driverId) {
  var ds = driverState[driverId];
  if (!ds) return;

  if (ds.marker)         { map.removeLayer(ds.marker); }
  if (ds.polylineSnapped){ map.removeLayer(ds.polylineSnapped); }
  if (ds.polylineRaw)    { map.removeLayer(ds.polylineRaw); }
  if (ds.routeRef)       { ds.routeRef.off('value', ds.routeListener); }
  if (ds.osrmTimer)      { clearTimeout(ds.osrmTimer); }
  removeDriverCard(driverId);
  delete driverState[driverId];
  updateDriverCount();
}

// =============================================================================
// FIREBASE - LIVE POSITION LISTENER
// Subscribes to gps/live and reacts to all child changes.
// child_added   -> new driver appeared
// child_changed -> driver moved / data updated
// child_removed -> shift ended or shift deleted
// =============================================================================
function attachLiveListener() {
  var ref = firebase.database().ref('gps/live');

  ref.on('child_added',   function(s){ upsertDriver(s.key, s.val()); });
  ref.on('child_changed', function(s){ upsertDriver(s.key, s.val()); });
  ref.on('child_removed', function(s){ removeDriver(s.key); });

  // Mark as live once the initial data load completes
  ref.once('value', function() {
    setStatus('live', 'Live (' + Object.keys(driverState).length + ' active)');
    document.getElementById('sync-dot').className = 'live';
  });

  // Re-label count periodically
  setInterval(function() {
    var n = Object.keys(driverState).length;
    document.getElementById('sync-label').textContent = 'Live (' + n + ' active)';
  }, 10000);
}

// =============================================================================
// PANEL TOGGLE
// =============================================================================
document.getElementById('panel-toggle').addEventListener('click', function() {
  var panel = document.getElementById('driver-panel');
  var toggle = document.getElementById('panel-toggle');
  var hidden = panel.style.display === 'none';
  panel.style.display = hidden ? '' : 'none';
  toggle.style.right = hidden ? '268px' : '0';
  toggle.style.borderRadius = hidden ? '6px 0 0 6px' : '6px';
  setTimeout(function(){ map.invalidateSize(); }, 200);
});

// =============================================================================
// FIREBASE INIT + ANONYMOUS AUTH
// We attach listeners ONLY after auth succeeds to avoid silent permission errors.
// Firebase anonymous auth persists in localStorage across reloads (no sign-in delay).
// =============================================================================
firebase.initializeApp(FIREBASE_CONFIG);

setStatus('auth', 'Authenticating...');

firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    setStatus('live', 'Connecting...');
    attachLiveListener();
  }
});

firebase.auth().signInAnonymously().catch(function(err) {
  setStatus('err', 'Auth failed: ' + err.message);
  console.error('[Firebase] Auth failed:', err);
});

</script>
</body>
</html>
