<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>RSA Driver Pilot — Live Map</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }

    /* Top status bar */
    #statusbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(13,71,161,0.92); backdrop-filter: blur(4px);
      color: #fff; padding: 8px 14px;
      display: flex; align-items: center; gap: 12px;
      font-size: 13px; font-weight: 600;
    }
    #statusbar .title { font-size: 14px; font-weight: 800; margin-right: 4px; }
    #driver-count {
      background: rgba(255,255,255,0.2); border-radius: 12px;
      padding: 2px 10px; font-size: 12px;
    }
    #sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #aaa; flex-shrink: 0;
    }
    #sync-dot.live { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
    #sync-dot.auth { background: #FF9800; }
    #sync-dot.err  { background: #f44336; }
    #sync-label { font-size: 11px; opacity: 0.8; }

    /* Legend */
    #legend {
      position: absolute; bottom: 16px; left: 14px; z-index: 1000;
      background: rgba(255,255,255,0.94); border-radius: 10px;
      padding: 10px 14px; font-size: 12px; color: #333;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 140px;
    }
    #legend .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    #legend .leg-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-line { width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    /* Driver cards panel (right side on desktop, bottom on mobile) */
    #driver-panel {
      position: absolute; top: 48px; right: 0; bottom: 0; z-index: 900;
      width: 260px; overflow-y: auto;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(4px);
      border-left: 1px solid #E0E0E0;
      padding: 10px 0;
    }
    .driver-card {
      padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
      transition: background 0.15s;
    }
    .driver-card:hover { background: #f5f9ff; }
    .driver-card .d-name { font-weight: 700; font-size: 13px; color: #1A1A2E; }
    .driver-card .d-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .driver-card .d-km { font-size: 12px; font-weight: 700; color: #0D47A1; margin-top: 3px; }
    .stage-badge {
      display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px;
      border-radius: 10px; margin-top: 3px;
    }
    .s1 { background: #E3F2FD; color: #1565C0; }
    .s2 { background: #F3E5F5; color: #6A1B9A; }
    .s3 { background: #FFF8E1; color: #F57F17; }
    .s4 { background: #E8F5E9; color: #2E7D32; }

    #no-drivers {
      padding: 24px 14px; text-align: center; color: #aaa; font-size: 13px;
    }

    /* Panel toggle button (mobile) */
    #panel-toggle {
      position: absolute; top: 56px; right: 268px; z-index: 1001;
      background: #0D47A1; color: #fff; border: none; border-radius: 6px 0 0 6px;
      padding: 8px 10px; cursor: pointer; font-size: 16px;
      box-shadow: -2px 2px 8px rgba(0,0,0,0.2);
    }

    @media (max-width: 640px) {
      #driver-panel { width: 200px; }
      #panel-toggle { right: 208px; }
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="statusbar">
  <span class="title">RSA Live Map</span>
  <span id="driver-count">0 active</span>
  <div style="flex:1"></div>
  <div id="sync-dot" class="auth"></div>
  <span id="sync-label">Authenticating...</span>
</div>

<button id="panel-toggle" title="Toggle driver list">&#9776;</button>

<div id="driver-panel">
  <div id="no-drivers">No active drivers right now</div>
</div>

<div id="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#0D47A1"></div> Driver (live)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#E53935"></div> Facility</div>
  <div class="leg-row"><div class="leg-line" style="background:#1976D2"></div> Snapped route</div>
</div>

<!-- Firebase App + Database + Auth (compat SDK v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// =============================================================================
// CONFIGURATION
// =============================================================================
var GOOGLE_MAPS_API_KEY = 'AIzaSyCEO-OiBPuSJ8iGZuR8nXIJ9tGL-uVby1c';

var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCTJcr0Yar3DIHLE36Pm6e3kdsFCIyt56k",
  authDomain:        "warehouse-stock-take.firebaseapp.com",
  databaseURL:       "https://warehouse-stock-take-default-rtdb.firebaseio.com",
  projectId:         "warehouse-stock-take",
  storageBucket:     "warehouse-stock-take.firebasestorage.app",
  messagingSenderId: "740578243967"
};

var FACILITY = { lat: 24.903892, lng: 55.114065 };

// Staleness: drivers with no GPS update for >15 min are treated as offline
var STALE_THRESHOLD_MS = 15 * 60 * 1000;

// Palette for up to 20 concurrent drivers
var DRIVER_COLORS = [
  '#0D47A1','#1B5E20','#880E4F','#E65100','#4A148C',
  '#006064','#BF360C','#1A237E','#33691E','#004D40',
  '#B71C1C','#F57F17','#01579B','#3E2723','#212121',
  '#6A1B9A','#00838F','#558B2F','#37474F','#4E342E'
];

// =============================================================================
// STATE
// =============================================================================
// driverState[driverId] = {
//   marker, infoWindow, polylines[], routePoints[], shiftRowId,
//   routeRef, routeListener, color, snapTimer, cardEl, currentData
// }
var map;
var driverState = {};
var colorIndex = 0;

function nextColor() {
  var c = DRIVER_COLORS[colorIndex % DRIVER_COLORS.length];
  colorIndex++;
  return c;
}

// =============================================================================
// INIT MAP (called by Google Maps callback)
// =============================================================================
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: FACILITY.lat, lng: FACILITY.lng },
    zoom: 13,
    mapId: 'rsa_live_map',
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });

  // Facility marker (red pin)
  new google.maps.Marker({
    position: { lat: FACILITY.lat, lng: FACILITY.lng },
    map: map,
    title: 'RSA Facility',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#E53935',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 3,
    },
  });

  // Start Firebase auth + listeners
  initFirebase();
}

// =============================================================================
// STATUS BAR
// =============================================================================
function setStatus(state, label) {
  var dot = document.getElementById('sync-dot');
  dot.className = state;  // live | auth | err
  document.getElementById('sync-label').textContent = label;
}

function updateDriverCount() {
  var n = Object.keys(driverState).length;
  document.getElementById('driver-count').textContent = n + ' active';
  document.getElementById('no-drivers').style.display = n === 0 ? '' : 'none';
}

// =============================================================================
// DRIVER CARD (sidebar)
// =============================================================================
function stageName(s) {
  return ['','S1: At Facility','S2: On Road','S3: Last Drop','S4: Done'][s] || ('Stage '+s);
}
function stageClass(s) {
  return ['','s1','s2','s3','s4'][s] || 's1';
}

function upsertDriverCard(driverId, data) {
  var panel = document.getElementById('driver-panel');
  var card = document.getElementById('card-' + driverId);
  if (!card) {
    card = document.createElement('div');
    card.className = 'driver-card';
    card.id = 'card-' + driverId;
    card.onclick = function() {
      var ds = driverState[driverId];
      if (ds && ds.marker) { map.panTo(ds.marker.getPosition()); map.setZoom(14); }
    };
    panel.appendChild(card);
  }
  var stage = data.stage || 1;
  var timeStr = data.ts ? new Date(data.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
  card.innerHTML =
    '<div class="d-name">' + escHtml(data.driverName || driverId) + '</div>' +
    '<div class="d-meta">' + escHtml(data.vehicle || '\u2014') + ' &middot; ' + escHtml(timeStr) + '</div>' +
    '<div class="d-km">' + (data.km||0).toFixed(1) + ' km</div>' +
    '<span class="stage-badge ' + stageClass(stage) + '">' + stageName(stage) + '</span>';
  return card;
}

function removeDriverCard(driverId) {
  var el = document.getElementById('card-' + driverId);
  if (el) el.remove();
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =============================================================================
// GOOGLE ROADS API — SNAP TO ROADS
// Sends GPS points to Roads API with interpolate=true for gap filling.
// Chunks into batches of 90 (API limit 100) with 5-point overlap.
// Returns array of segments (arrays of LatLng) for gap-aware rendering.
// =============================================================================
function snapToRoads(points, retryCount) {
  retryCount = retryCount || 0;
  if (points.length < 2) return Promise.resolve({ segments: [points.map(function(p){ return {lat: p.lat, lng: p.lng}; })] });

  // Chunk into batches of 90 with 5-point overlap
  var BATCH = 90, OVERLAP = 5;
  var batches = [];
  for (var i = 0; i < points.length; i += BATCH - OVERLAP) {
    batches.push(points.slice(i, i + BATCH));
    if (i + BATCH >= points.length) break;
  }

  return processBatches(batches, OVERLAP)
    .then(function(allSnapped) {
      if (allSnapped.length < 2) {
        return { segments: [points.map(function(p){ return {lat: p.lat, lng: p.lng}; })] };
      }
      // Split at gaps > 500m
      var segments = splitAtGaps(allSnapped, 500);
      return { segments: segments.length > 0 ? segments : [allSnapped] };
    })
    .catch(function(e) {
      console.warn('[Roads API] snap failed (attempt ' + (retryCount+1) + '):', e.message);
      if (retryCount < 1) {
        return new Promise(function(resolve) {
          setTimeout(function() { resolve(snapToRoads(points, retryCount + 1)); }, 2000);
        });
      }
      return { segments: [points.map(function(p){ return {lat: p.lat, lng: p.lng}; })] };
    });
}

function processBatches(batches, overlap) {
  var allSnapped = [];
  var chain = Promise.resolve();
  batches.forEach(function(batch, idx) {
    chain = chain.then(function() {
      var path = batch.map(function(p){ return p.lat + ',' + p.lng; }).join('|');
      var url = 'https://roads.googleapis.com/v1/snapToRoads?path=' + path
        + '&interpolate=true&key=' + GOOGLE_MAPS_API_KEY;
      return fetch(url, { signal: AbortSignal.timeout(10000) })
        .then(function(resp) {
          if (!resp.ok) throw new Error('Roads API HTTP ' + resp.status);
          return resp.json();
        })
        .then(function(data) {
          if (!data.snappedPoints || data.snappedPoints.length === 0) return;
          var coords = data.snappedPoints.map(function(sp) {
            return { lat: sp.location.latitude, lng: sp.location.longitude };
          });
          // Skip overlap from previous batch
          if (idx > 0 && allSnapped.length > 0 && coords.length > overlap) {
            allSnapped = allSnapped.concat(coords.slice(overlap));
          } else {
            allSnapped = allSnapped.concat(coords);
          }
        });
    });
  });
  return chain.then(function() { return allSnapped; });
}

// Haversine distance (metres)
function haversineM(a, b) {
  var R = 6371000;
  var dLat = (b.lat - a.lat) * Math.PI / 180;
  var dLng = (b.lng - a.lng) * Math.PI / 180;
  var x = Math.sin(dLat/2) * Math.sin(dLat/2)
        + Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180)
        * Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// Split coordinate array into segments at gaps > thresholdM
function splitAtGaps(coords, thresholdM) {
  if (coords.length < 2) return [coords];
  var segments = [];
  var seg = [coords[0]];
  for (var i = 1; i < coords.length; i++) {
    if (haversineM(coords[i-1], coords[i]) > thresholdM) {
      if (seg.length >= 2) segments.push(seg);
      seg = [coords[i]];
    } else {
      seg.push(coords[i]);
    }
  }
  if (seg.length >= 2) segments.push(seg);
  return segments;
}

// =============================================================================
// ROUTE RENDERING
// Debounced per driver. Draws multi-segment polylines.
// =============================================================================
function scheduleRouteRedraw(driverId) {
  var ds = driverState[driverId];
  if (!ds) return;
  if (ds.snapTimer) clearTimeout(ds.snapTimer);
  ds.snapTimer = setTimeout(function(){ redrawRoute(driverId); }, 3000);
}

function redrawRoute(driverId) {
  var ds = driverState[driverId];
  if (!ds || ds.routePoints.length < 2) return;

  // Remove old polylines
  clearPolylines(ds);

  // Call Google Roads API for road-snapped polyline
  snapToRoads(ds.routePoints).then(function(result) {
    if (!driverState[driverId]) return; // driver removed while waiting
    clearPolylines(ds); // clear any that appeared during async wait
    result.segments.forEach(function(seg) {
      if (seg.length >= 2) {
        var pl = new google.maps.Polyline({
          path: seg,
          strokeColor: ds.color,
          strokeWeight: 5,
          strokeOpacity: 0.85,
          map: map,
        });
        ds.polylines.push(pl);
      }
    });
  });
}

function clearPolylines(ds) {
  if (ds.polylines) {
    ds.polylines.forEach(function(pl) { pl.setMap(null); });
  }
  ds.polylines = [];
}

// =============================================================================
// FIREBASE ROUTE LISTENER - subscribes to gps/routes/{shiftRowId}
// =============================================================================
function attachRouteListener(driverId, shiftRowId) {
  var ds = driverState[driverId];
  if (!ds) return;

  // Detach previous listener if rowId changed
  if (ds.routeRef) {
    ds.routeRef.off('value', ds.routeListener);
    ds.routeRef = null; ds.routeListener = null;
  }

  if (!shiftRowId) return;

  var ref = firebase.database().ref('gps/routes/' + shiftRowId);
  var handler = function(snapshot) {
    var val = snapshot.val();
    if (!val) { ds.routePoints = []; return; }
    var pts = Object.values(val).sort(function(a, b) { return a.ts < b.ts ? -1 : 1; });
    ds.routePoints = pts;
    scheduleRouteRedraw(driverId);
  };
  ref.on('value', handler);
  ds.routeRef = ref;
  ds.routeListener = handler;
}

// =============================================================================
// ADD / UPDATE DRIVER ON MAP
// =============================================================================
function upsertDriver(driverId, data) {
  var today = new Date().toISOString().slice(0,10);
  // Only show drivers from today
  if (data.date && data.date !== today) return;

  // Staleness check: if last GPS update is >15 min old, treat as offline
  if (data.ts) {
    var tsAge = Date.now() - new Date(data.ts).getTime();
    if (tsAge > STALE_THRESHOLD_MS) {
      if (driverState[driverId]) removeDriver(driverId);
      return;
    }
  }

  var lat = parseFloat(data.lat);
  var lng = parseFloat(data.lng);
  if (!lat || !lng) return;

  var ds = driverState[driverId];

  if (!ds) {
    // New driver — create marker + state
    var color = nextColor();
    var marker = new google.maps.Marker({
      position: { lat: lat, lng: lng },
      map: map,
      title: data.driverName || driverId,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 14,
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 3,
      },
      label: {
        text: '\uD83D\uDE9A', // truck emoji
        fontSize: '16px',
      },
    });

    var infoWindow = new google.maps.InfoWindow();
    marker.addListener('click', function() {
      infoWindow.setContent(buildPopup(driverId));
      infoWindow.open(map, marker);
    });

    ds = {
      marker: marker, infoWindow: infoWindow, color: color,
      polylines: [], routePoints: [], shiftRowId: null,
      routeRef: null, routeListener: null,
      snapTimer: null, cardEl: null, currentData: null,
    };
    driverState[driverId] = ds;
    updateDriverCount();
  } else {
    // Move existing marker
    ds.marker.setPosition({ lat: lat, lng: lng });
  }

  // Update data and sidebar card
  ds.currentData = data;
  upsertDriverCard(driverId, data);

  // Attach route listener if shiftRowId changed
  if (data.shiftRowId && data.shiftRowId !== ds.shiftRowId) {
    ds.shiftRowId = data.shiftRowId;
    ds.routePoints = [];
    attachRouteListener(driverId, data.shiftRowId);
  }
}

function buildPopup(driverId) {
  var ds = driverState[driverId];
  if (!ds || !ds.currentData) return 'Loading...';
  var d = ds.currentData;
  var time = d.ts ? new Date(d.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
  return '<div style="font-size:13px;min-width:140px">'
    + '<b style="font-size:14px">' + escHtml(d.driverName||driverId) + '</b><br>'
    + '<span style="color:#666">Shift: ' + escHtml(d.shiftRowId||'\u2014') + '</span><br>'
    + '<b style="color:#0D47A1">' + (d.km||0).toFixed(2) + ' km</b>'
    + '<span style="color:#aaa;font-size:11px;float:right">' + time + '</span><br>'
    + '<span style="color:#888;font-size:11px">Accuracy: ' + Math.round(d.accuracy||0) + 'm</span>'
    + '</div>';
}

// =============================================================================
// REMOVE DRIVER FROM MAP
// =============================================================================
function removeDriver(driverId) {
  var ds = driverState[driverId];
  if (!ds) return;

  if (ds.marker)     { ds.marker.setMap(null); }
  if (ds.infoWindow) { ds.infoWindow.close(); }
  clearPolylines(ds);
  if (ds.routeRef)   { ds.routeRef.off('value', ds.routeListener); }
  if (ds.snapTimer)  { clearTimeout(ds.snapTimer); }
  removeDriverCard(driverId);
  delete driverState[driverId];
  updateDriverCount();
}

// =============================================================================
// FIREBASE - LIVE POSITION LISTENER
// =============================================================================
function attachLiveListener() {
  var ref = firebase.database().ref('gps/live');

  ref.on('child_added',   function(s){ upsertDriver(s.key, s.val()); });
  ref.on('child_changed', function(s){ upsertDriver(s.key, s.val()); });
  ref.on('child_removed', function(s){ removeDriver(s.key); });

  // Mark as live once initial data loads
  ref.once('value', function() {
    setStatus('live', 'Live (' + Object.keys(driverState).length + ' active)');
    document.getElementById('sync-dot').className = 'live';
  });

  // Update count label periodically
  setInterval(function() {
    var n = Object.keys(driverState).length;
    document.getElementById('sync-label').textContent = 'Live (' + n + ' active)';
  }, 10000);

  // Periodic staleness sweep — remove drivers whose last GPS update is >15 min old
  setInterval(function() {
    var now = Date.now();
    Object.keys(driverState).forEach(function(id) {
      var ds = driverState[id];
      if (ds && ds.currentData && ds.currentData.ts) {
        var age = now - new Date(ds.currentData.ts).getTime();
        if (age > STALE_THRESHOLD_MS) {
          console.log('[Stale] Removing driver', id, '- last update', Math.round(age/1000), 's ago');
          removeDriver(id);
        }
      }
    });
    updateDriverCount();
  }, 60000);
}

// =============================================================================
// PANEL TOGGLE
// =============================================================================
document.getElementById('panel-toggle').addEventListener('click', function() {
  var panel = document.getElementById('driver-panel');
  var toggle = document.getElementById('panel-toggle');
  var hidden = panel.style.display === 'none';
  panel.style.display = hidden ? '' : 'none';
  toggle.style.right = hidden ? '268px' : '0';
  toggle.style.borderRadius = hidden ? '6px 0 0 6px' : '6px';
});

// =============================================================================
// FIREBASE INIT + ANONYMOUS AUTH
// =============================================================================
function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);

  setStatus('auth', 'Authenticating...');

  firebase.auth().onAuthStateChanged(function(user) {
    if (user) {
      setStatus('live', 'Connecting...');
      attachLiveListener();
    }
  });

  firebase.auth().signInAnonymously().catch(function(err) {
    setStatus('err', 'Auth failed: ' + err.message);
    console.error('[Firebase] Auth failed:', err);
  });
}

</script>

<!-- Google Maps JavaScript API (loads async, calls initMap when ready) -->
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCEO-OiBPuSJ8iGZuR8nXIJ9tGL-uVby1c&callback=initMap">
</script>

</body>
